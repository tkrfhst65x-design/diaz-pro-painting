<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Díaz Pro Painting LLC</title>

<style>
:root{
  --bg:#070b14;
  --panel:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.12);
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.65);
  --red:#ff4d4d;
  --orange:#ff8a4c;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden; /* ✅ FIX GLOBAL */
}

.section{
  max-width:1200px;
  margin:auto;
  padding:28px 16px;
}

h1{ font-size:42px; margin:0 0 10px; }
h2{ font-size:26px; margin:0 0 6px; }
.sub{ color:var(--muted); font-size:14px; margin-bottom:18px; }

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:22px;
  padding:16px;
}

/* ===== Buttons ===== */
.buttons{ display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
.btn{
  padding:12px 16px;
  border-radius:999px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  font-weight:800;
  cursor:pointer;
}
.btn.primary{
  background:linear-gradient(135deg,var(--red),var(--orange));
  border:none;
  color:#0b1020;
}

/* ===== Services ===== */
.grid3{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

/* ===== Gallery ===== */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:14px;
}

.gallery-item{
  border-radius:18px;
  overflow:hidden;
  border:1px solid var(--border);
  cursor:pointer;
  position:relative;
  background:black;
}

.gallery-item img,
.gallery-item video{
  width:100%;
  height:150px;
  object-fit:cover;
  display:block;
}

.badge{
  position:absolute;
  top:8px;
  left:8px;
  background:rgba(0,0,0,.6);
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

/* ===== Lightbox ===== */
.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  z-index:9999;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:20px;
}
.lightbox[open]{ display:flex; }

.lightbox img,
.lightbox video{
  max-width:95vw;
  max-height:80vh;
  border-radius:18px;
}

.lb-controls{
  margin-top:16px;
  display:flex;
  gap:12px;
}

.lb-btn{
  padding:10px 14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--panel);
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* ===== Reviews ===== */
.reviews-viewport{ overflow:hidden; }

.review-item{
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  background:var(--panel);
  margin-top:10px;
  min-width:0;
  overflow:hidden;
}

.review-text{
  color:var(--muted);
  margin-top:6px;

  /* ✅ FIX DEFINITIVO MOBILE */
  white-space:normal;
  overflow-wrap:anywhere;
  word-break:break-word;
}

@media(max-width:900px){
  h1{ font-size:34px; }
}
</style>
</head>

<body>

<!-- ===== HERO ===== -->
<section class="section">
  <div class="card">
    <h1>Professional Painting Services</h1>
    <div class="sub">Residential & Commercial Painting</div>

    <div class="buttons">
      <a class="btn primary" href="tel:+16163810443">📞 Call</a>
      <a class="btn" href="mailto:diazpropaintingllc24@gmail.com">✉️ Email</a>
      <a class="btn" href="https://wa.me/16163810443">💬 WhatsApp</a>
    </div>
  </div>
</section>

<!-- ===== SERVICES ===== -->
<section class="section">
  <h2>Services</h2>
  <div class="grid3">
    <div class="card"><b>Interior Painting</b><div class="sub">Walls • Ceilings • Trim</div></div>
    <div class="card"><b>Exterior Painting</b><div class="sub">Prep • Prime • Finish</div></div>
    <div class="card"><b>Repairs</b><div class="sub">Drywall • Patch • Texture</div></div>
  </div>
</section>

<!-- ===== GALLERY ===== -->
<section class="section">
  <h2>Gallery</h2>
  <div class="gallery-grid" id="galleryGrid"></div>
</section>

<!-- ===== REVIEWS ===== -->
<section class="section" id="reviews">
  <h2>Reviews</h2>
  <div class="reviews-viewport" id="reviewList"></div>
</section>

<!-- ===== LIGHTBOX ===== -->
<div class="lightbox" id="lightbox">
  <div id="lbMedia"></div>

  <div class="lb-controls">
    <button class="lb-btn" id="lbPrev">‹</button>
    <button class="lb-btn" id="lbClose">✕</button>
    <button class="lb-btn" id="lbNext">›</button>
  </div>
</div>

<script>
/* =========================
   GALERÍA — ARCHIVOS EN RAÍZ
   ========================= */

const ITEMS=[
  {type:"image",src:"01.jpg"},
  {type:"image",src:"02.jpg"},
  {type:"image",src:"03.jpg"},
  {type:"image",src:"04.jpg"},
  {type:"image",src:"05.jpg"},
  {type:"video",src:"06.mp4"},
  {type:"video",src:"07.mp4"}
];

const grid=document.getElementById("galleryGrid");
const lb=document.getElementById("lightbox");
const lbMedia=document.getElementById("lbMedia");

let current=0;

ITEMS.forEach((item,i)=>{
  const div=document.createElement("div");
  div.className="gallery-item";

  const badge=document.createElement("div");
  badge.className="badge";
  badge.textContent=item.type==="video"?"Video":"Foto";

  if(item.type==="video"){
    const v=document.createElement("video");
    v.src=item.src;
    v.muted=true;
    v.playsInline=true;
    v.preload="metadata";
    div.appendChild(v);
  } else{
    const img=document.createElement("img");
    img.src=item.src;
    div.appendChild(img);
  }

  div.appendChild(badge);
  div.onclick=()=>openLB(i);
  grid.appendChild(div);
});

function openLB(i){
  current=i;
  lb.setAttribute("open","");
  document.body.style.overflow="hidden";
  renderLB();
}

function closeLB(){
  lb.removeAttribute("open");
  document.body.style.overflow="";
}

function renderLB(){
  const item=ITEMS[current];
  lbMedia.innerHTML="";

  if(item.type==="video"){
    const v=document.createElement("video");
    v.src=item.src;
    v.controls=true;
    v.autoplay=true;
    lbMedia.appendChild(v);
  } else{
    const img=document.createElement("img");
    img.src=item.src;
    lbMedia.appendChild(img);
  }
}

lbClose.onclick=closeLB;
lbPrev.onclick=()=>{ if(current>0){current--;renderLB();}};
lbNext.onclick=()=>{ if(current<ITEMS.length-1){current++;renderLB();}};

/* =========================
   REVIEWS DEMO
   ========================= */

const reviews=[
 "Excelente trabajo. Muy responsables, puntuales y detallistas. Volvería a contratar sin dudas.",
 "Very professional finish and clean work.",
 "Highly recommended."
];

const reviewList=document.getElementById("reviewList");

reviews.forEach(r=>{
  const div=document.createElement("div");
  div.className="review-item";
  div.innerHTML=`<div class="review-text">${r}</div>`;
  reviewList.appendChild(div);
});
</script>

</body>
</html>
